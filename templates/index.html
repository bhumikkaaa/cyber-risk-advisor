<!DOCTYPE html>
<html>
<head>
    <title>Cyber Risk Advisor</title>
</head>
<body>
    <h2>🔐 Cyber Risk Advisor</h2>

    <form method="POST">
        Password:<br>
        <input type="text" name="password" required><br><br>

        Network:<br>
        <select name="network">
            <option value="public">Public</option>
            <option value="private">Private</option>
        </select><br><br>

        Role:<br>
        <select name="role">
            <option value="admin">Admin</option>
            <option value="user">User</option>
        </select><br><br>

        <button type="submit">Analyze</button>
    </form>

    {% if issues %}
        <h3>Issues:</h3>
        <ul>
            {% for i in issues %}
                <li>{{ i }}</li>
            {% endfor %}
        </ul>

        <h3>Risk Score: {{ score }} ({{ level }})</h3>

        <h3>Suggestions:</h3>
        <ul>
            {% for s in suggestions %}
                <li>{{ s }}</li>
            {% endfor %}
        </ul>
    {% endif %}
</body>
</html>
